<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bg: '#0d1117',
          'bg-card': '#161b22',
          'bg-sidebar': '#1a1a2e',
          border: '#30363d',
          text: '#e6edf3',
          'text-secondary': '#8b949e',
          'text-dim': '#6e7681',
          'accent-blue': '#58a6ff',
          'accent-green': '#3fb950',
          'accent-purple': '#bc8cff',
          'accent-orange': '#d29922',
          'accent-red': '#f85149',
          'accent-yellow': '#d29922',
        }
      }
    }
  }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #0a0a0a; margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    .options-grid { display: grid; grid-template-columns: 1fr; gap: 32px; max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
    @media (min-width: 900px) { .options-grid { grid-template-columns: 1fr 1fr; } }
    .option-card { background: #111; border: 1px solid #222; border-radius: 12px; overflow: hidden; }
    .option-header { padding: 16px 20px; border-bottom: 1px solid #222; }
    .option-header h3 { color: #e6edf3; font-size: 15px; font-weight: 600; margin: 0 0 4px; }
    .option-header p { color: #8b949e; font-size: 12px; margin: 0; line-height: 1.5; }
    .option-demo { height: 520px; overflow: hidden; }
    .page-title { color: #e6edf3; font-size: 28px; font-weight: 700; text-align: center; padding: 40px 0 0; }
    .page-sub { color: #8b949e; font-size: 14px; text-align: center; padding: 8px 0 16px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ── Shared mock data ─────────────────────────────────── */
    const starred = [
      { name: "clay/terra", sessions: 289, date: "Today" },
      { name: "clay/keystone", sessions: 3, date: "4d ago" },
    ];
    const more = [
      { name: "tools/session-explorer", sessions: 42, date: "2d ago" },
      { name: "tools/db-safe", sessions: 18, date: "1w ago" },
      { name: "personal/blog", sessions: 7, date: "2w ago" },
    ];
    const tags = [
      { name: "auth-rewrite", color: "#58a6ff", count: 12 },
      { name: "performance", color: "#3fb950", count: 8 },
      { name: "bug-fixes", color: "#f85149", count: 23 },

      { title: "Session search FTS fixes", workspace: "tools/session-explorer", time: "4d ago", msgs: 41 },

    /* ═══════════════════════════════════════════════════════
       OPTION 1 — Linear: Quiet sidebar + recent activity feed
       ═══════════════════════════════════════════════════════ */
    function Option1_Linear() {
      const [expanded, setExpanded] = useState(false);
      return (
        <div className="flex h-full">
          <aside className="w-[220px] min-w-[220px] bg-bg-sidebar border-r border-border flex flex-col">
            <div className="px-3 pt-4 pb-1">
              <div className="flex items-center gap-2 px-2 py-1.5 rounded-md hover:bg-white/5 cursor-pointer transition-colors">
                <div className="w-5 h-5 rounded bg-accent-blue/20 flex items-center justify-center text-accent-blue text-[10px] font-bold">S</div>
                <span className="text-[13px] font-medium text-text flex-1">Sessions</span>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" className="text-text-dim"><circle cx="6" cy="6" r="5" stroke="currentColor" strokeWidth="1.2"/><line x1="4" y1="6" x2="8" y2="6" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/><line x1="6" y1="4" x2="6" y2="8" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>

            <div className="px-3 pb-2">

            <nav className="flex-1 overflow-y-auto px-3">
              <div className="px-2 pt-1 pb-1 text-[10px] font-semibold uppercase tracking-widest text-text-dim">Starred</div>

                <div key={i} className="group flex items-center px-2 py-1.5 rounded-md hover:bg-white/6 cursor-pointer transition-colors">
                  <span className="text-[13px] text-text flex-1 truncate">{w.name}</span>
                  <span className="text-[10px] text-text-dim opacity-0 group-hover:opacity-100 transition-opacity">{w.sessions}</span>

                <button onClick={() => setExpanded(!expanded)} className="flex items-center gap-1 px-2 py-1 text-[11px] text-text-dim hover:text-text-secondary transition-colors">

              {tags.map((t, i) => (
                <div key={i} className="flex items-center gap-2 px-2 py-1 rounded-md hover:bg-white/6 cursor-pointer transition-colors">
                  <span className="w-1.5 h-1.5 rounded-full" style={{background: t.color}}/>
                  <span className="text-[12px] text-text-secondary flex-1 truncate">{t.name}</span>
                </div>

          </aside>
          <main className="flex-1 bg-bg p-8 overflow-y-auto">
            <div className="max-w-[640px]">

              <p className="text-[13px] text-text-secondary mt-1">Pick up where you left off</p>
              <div className="mt-6 space-y-1">
                {recentSessions.map((s, i) => (
                  <div key={i} className="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/4 cursor-pointer transition-colors group">
                    <div className="w-1 h-1 rounded-full bg-accent-blue/60 shrink-0"/>
                    <div className="flex-1 min-w-0">
                      <div className="text-[13px] text-text truncate">{s.title}</div>
                      <div className="text-[11px] text-text-dim">{s.workspace}</div>
                    </div>
                    <div className="text-[11px] text-text-dim shrink-0">{s.time}</div>
                  </div>
                ))}
              </div>
            </div>
          </main>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════
       OPTION 2 — Vercel: Minimal sidebar + stat sparklines
       ═══════════════════════════════════════════════════════ */
    function Option2_Vercel() {
      return (
        <div className="flex h-full">

                <div key={i} className="flex items-center gap-2 px-2.5 py-2 rounded-md hover:bg-white/5 cursor-pointer transition-colors">

                </div>

              <div className="grid grid-cols-3 gap-3 mt-6">

                  <div className="text-[28px] font-bold text-text mt-1">1,468</div>
                  <svg className="mt-2" width="100%" height="24" viewBox="0 0 120 24"><path d="M0 20 L10 18 L20 16 L30 19 L40 14 L50 12 L60 15 L70 10 L80 8 L90 11 L100 6 L110 4 L120 2" fill="none" stroke="#58a6ff" strokeWidth="1.5"/></svg>

                  <div className="text-[28px] font-bold text-text mt-1">133</div>

                <div className="bg-bg-card rounded-lg p-4">
                  <div className="text-[11px] text-text-dim uppercase tracking-wide">Today</div>
                  <div className="text-[28px] font-bold text-text mt-1">12</div>
                  <div className="text-[11px] text-accent-green mt-2">+3 from yesterday</div>
                </div>
              </div>
              <h2 className="text-[14px] font-medium text-text mt-8 mb-3">Recent</h2>
              <div className="space-y-px">
                {recentSessions.slice(0,4).map((s, i) => (
                  <div key={i} className="flex items-center gap-3 px-4 py-3 bg-bg-card first:rounded-t-lg last:rounded-b-lg hover:bg-white/4 cursor-pointer transition-colors border-b border-border/30 last:border-0">
                    <div className="flex-1 min-w-0">
                      <div className="text-[13px] text-text">{s.title}</div>
                      <div className="text-[11px] text-text-dim mt-0.5">{s.workspace} &middot; {s.msgs} messages</div>
                    </div>
                    <span className="text-[11px] text-text-dim">{s.time}</span>
                  </div>
                ))}
              </div>
            </div>
          </main>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════
       OPTION 3 — Raycast: Ultra-compact sidebar + command bar focus
       ═══════════════════════════════════════════════════════ */
    function Option3_Raycast() {
      return (
        <div className="flex h-full">
          <aside className="w-[52px] min-w-[52px] bg-[#0f0f14] border-r border-[#1e1e28] flex flex-col items-center py-3 gap-1">
            <div className="w-8 h-8 rounded-lg bg-accent-blue/15 flex items-center justify-center text-accent-blue text-[11px] font-bold mb-2 cursor-pointer hover:bg-accent-blue/25 transition-colors" title="Search">

            </div>
            <div className="w-8 h-8 rounded-lg bg-accent-blue/10 flex items-center justify-center text-accent-blue text-[10px] font-bold cursor-pointer" title="clay/terra">T</div>
            <div className="w-8 h-8 rounded-lg hover:bg-white/6 flex items-center justify-center text-text-dim text-[10px] font-bold cursor-pointer transition-colors" title="clay/keystone">K</div>
            <div className="h-px w-5 bg-white/8 my-1"/>

                      <div className="text-[13px] text-text truncate">{s.title}</div>

                    <span className="text-[11px] text-text-dim">{s.time}</span>
                  </div>
                ))}
              </div>
            </div>

    /* ═══════════════════════════════════════════════════════

       ═══════════════════════════════════════════════════════ */

                <div key={i} className="flex items-center gap-2 px-2.5 py-2 rounded-md hover:bg-white/5 cursor-pointer transition-colors">

                  <span className="text-[10px] text-text-dim">{w.date}</span>
                </div>
              ))}

            <div className="px-3 py-3 border-t border-border/50">
              <div className="flex flex-wrap gap-1">
                {tags.map((t, i) => (
                  <span key={i} className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] bg-white/5 text-text-secondary hover:bg-white/8 cursor-pointer transition-colors">
                    <span className="w-1.5 h-1.5 rounded-full" style={{background: t.color}}/>{t.name}
                  </span>

                    <div className="flex-1 min-w-0">

                      <div className="text-[11px] text-text-dim mt-0.5">{s.workspace} &middot; {s.time}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </main>
        </div>
      );
